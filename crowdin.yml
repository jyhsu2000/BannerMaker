# Crowdin 連線設定
# 連線憑證由環境變數提供（搭配 .env + dotenv-cli，或 GitHub Actions secrets）
project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN

base_path: .
base_url: https://api.crowdin.com
# 不保留 repo 內的目錄階層，讓 Crowdin 上只看到 en-US.yml 一個檔，與舊有結構一致
preserve_hierarchy: false

# 來源與翻譯產出檔名規則
#
# 本專案語系檔名採用 IETF BCP 47 格式（如 de-DE.yml、zh-TW.yml）。
# 但 Crowdin 對多數語言預設使用較短的代碼（如 `de` 代表德語），
# 故下方 languages_mapping 將 Crowdin 預設代碼轉換為本專案的檔名格式。
#
# 此 mapping 同時擔任「下載白名單」── 只有列在這裡的語言才會被處理。
# 故意不列 zh-TW，使其完全由維護者於本機維護，不被 Crowdin 下載覆蓋。
#
# 若未來在 Crowdin 介面新增語言，記得同步在此處加入對應條目。
files:
  - source: /src/main/resources/language/en-US.yml
    translation: /src/main/resources/language/%locale%.yml
    languages_mapping:
      locale:
        de:    de-DE
        es-ES: es-ES
        fr:    fr-FR
        hu:    hu-HU
        it:    it-IT
        nl:    nl-NL
        pl:    pl-PL
        pt-BR: pt-BR
        ru:    ru-RU
        uk:    uk-UA
        zh-CN: zh-CN
